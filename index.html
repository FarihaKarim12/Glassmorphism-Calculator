<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
        <span class="toggle-icon" id="toggleIcon">☀️</span>
        <span class="toggle-label" id="toggleLabel">light</span>
    </button>

    <main class="app-container">

        <section class="calculator-card" aria-label="Calculator">
            <div class="calc-header">
                <span class="calc-title">CALC</span>
            </div>

            <div class="display" aria-live="polite" aria-atomic="true">
                <div class="expression" id="expression">&nbsp;</div>
                <div class="result" id="result">0</div>
            </div>

            <div class="btn-grid">
                <button class="btn btn-fn" data-action="clear" aria-label="Clear">C</button>
                <button class="btn btn-fn" data-action="sqrt" aria-label="Square root">√</button>
                <button class="btn btn-fn" data-action="percent" aria-label="Percent">%</button>
                <button class="btn btn-op" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

                <button class="btn btn-num" data-action="number" data-value="7">7</button>
                <button class="btn btn-num" data-action="number" data-value="8">8</button>
                <button class="btn btn-num" data-action="number" data-value="9">9</button>
                <button class="btn btn-op" data-action="operator" data-value="×" aria-label="Multiply">×</button>
        
                <button class="btn btn-num" data-action="number" data-value="4">4</button>
                <button class="btn btn-num" data-action="number" data-value="5">5</button>
                <button class="btn btn-num" data-action="number" data-value="6">6</button>
                <button class="btn btn-op" data-action="operator" data-value="−" aria-label="Subtract">−</button>
        
                <button class="btn btn-num" data-action="number" data-value="1">1</button>
                <button class="btn btn-num" data-action="number" data-value="2">2</button>
                <button class="btn btn-num" data-action="number" data-value="3">3</button>
                <button class="btn btn-op" data-action="operator" data-value="+" aria-label="Add">+</button>
        
                <button class="btn btn-num btn-wide" data-action="number" data-value="0">0</button>
                <button class="btn btn-num" data-action="decimal" aria-label="Decimal point">.</button>
                <button class="btn btn-eq" data-action="equals" aria-label="Equals">=</button>
            </div>
        </section>

        <aside class="history-panel" aria-label="Calculation History">
            <div class="history-header">
                <span class="history-title">HISTORY</span>
                <button class="clear-history-btn" id="clearHistory" aria-label="Clear History">X Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty" id="historyEmpty">
                    <div class="empty-icon">◷</div>
                    <p>No calculation yet</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
